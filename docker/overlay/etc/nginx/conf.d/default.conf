server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # SPA support
        try_files $uri $uri/ /index.html;

        # Inject base tag into index.html
        sub_filter '<head>' '<head><base href="/">';
        sub_filter_once on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
