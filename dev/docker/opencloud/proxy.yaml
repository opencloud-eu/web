# This adds four additional routes to the proxy. Forwarding
# request on '/carddav/', '/caldav/' and the respective '/.well-knwown'
# endpoints to the radicale container and setting the required headers.
additional_policies:
  - name: default
    routes:
      # Realtime collab sidecar. The hocuspocus container terminates plain
      # HTTP on :1234; OC's reverse proxy upgrades the incoming WebSocket
      # request and forwards it on. Pattern is borrowed from the
      # opencloud-music sidecar setup. `unprotected: true` because
      # hocuspocus does its own bearer-token validation against OC's
      # Graph API (see dev/docker/hocuspocus/server.js
      # `validateTokenAgainstOpenCloud`) and must see the Authorization
      # header the client sent verbatim, not whatever OC's proxy would
      # substitute.
      - endpoint: /realtime
        backend: http://hocuspocus:1234
        unprotected: true
      - endpoint: /caldav/
        backend: http://host.docker.internal:5232
        remote_user_header: X-Remote-User
        skip_x_access_token: true
        additional_headers:
          - X-Script-Name: /caldav
      - endpoint: /.well-known/caldav
        backend: http://host.docker.internal:5232
        remote_user_header: X-Remote-User
        skip_x_access_token: true
        additional_headers:
          - X-Script-Name: /caldav
      - endpoint: /carddav/
        backend: http://host.docker.internal:5232
        remote_user_header: X-Remote-User
        skip_x_access_token: true
        additional_headers:
          - X-Script-Name: /carddav
      - endpoint: /.well-known/carddav
        backend: http://host.docker.internal:5232
        remote_user_header: X-Remote-User
        skip_x_access_token: true
        additional_headers:
          - X-Script-Name: /carddav
      # To enable the radicale web UI add this rule.
      # "unprotected" is True because the Web UI itself ask for
      # the password.
      # Also set "type" to "internal" in the config/radicale/config
      #- endpoint: /caldav/.web/
      #  backend: http://radicale:5232/
      #  unprotected: true
      #  skip_x_access_token: true
      #  additional_headers:
      #    - X-Script-Name: /caldav
