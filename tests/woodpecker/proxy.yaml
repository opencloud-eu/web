# OC reverse-proxy policies used during CI e2e runs. Mirrors what the
# dev compose mounts at /etc/opencloud/proxy.yaml, but keeps only the
# routes relevant to the test suites. Added by the openCloudService
# step via `cp ... /root/.opencloud/config/proxy.yaml`.
additional_policies:
  - name: default
    routes:
      # Realtime collab sidecar. Same pattern as in dev: hocuspocus runs
      # plain HTTP on :1234, OC's reverse proxy WebSocket-upgrades the
      # incoming request and forwards it. `unprotected: true` because
      # hocuspocus does its own bearer-token validation against OC's
      # Graph API and must see the Authorization header verbatim.
      - endpoint: /realtime
        backend: http://hocuspocus:1234
        unprotected: true
